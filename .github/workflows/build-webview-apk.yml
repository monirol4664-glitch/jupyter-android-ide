name: Fast Jupyter Mobile APK

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK (cached)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK with caching
        uses: maxim-lobanov/setup-android-tools@v1
        with:
          packages: |
            platforms;android-30
            build-tools;30.0.3
          cache: true  # Critical for speed!
      
      - name: Create Android Project
        run: |
          # Create minimal Android project
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/jupyter/mobile
          
          # Create WebView Activity
          cat > app/src/main/java/com/jupyter/mobile/MainActivity.java << 'JAVA'
          package com.jupyter.mobile;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(getResources().getIdentifier("activity_main", "layout", getPackageName()));
                  
                  webView = findViewById(getResources().getIdentifier("webview", "id", getPackageName()));
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setAllowFileAccess(true);
                  webSettings.setAllowFileAccessFromFileURLs(true);
                  webSettings.setAllowUniversalAccessFromFileURLs(true);
                  
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/jupyter_lite/index.html");
              }
              
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          JAVA
      
      - name: Download JupyterLite (offline Python)
        run: |
          cd app/src/main/assets
          # Download pre-built JupyterLite (includes Pyodide - Python in WebAssembly)
          wget -q https://github.com/jupyterlite/jupyterlite-demo/releases/download/v0.1.0/jupyterlite-demo.zip
          unzip -q jupyterlite-demo.zip
          rm jupyterlite-demo.zip
          mv jupyterlite-demo/* .
          rmdir jupyterlite-demo
          
          # Configure for offline use
          cat > jupyter-lite.json << 'JSON'
          {
            "jupyter-lite-schema-version": 0,
            "jupyter-config-data": {
              "appName": "Jupyter Mobile",
              "appVersion": "1.0.0",
              "baseUrl": "./",
              "exposeAppInBrowser": true,
              "settingsOverrides": {
                "@jupyterlab/apputils-extension:themes": {
                  "theme": "JupyterLab Dark"
                }
              }
            }
          }
          JSON
      
      - name: Create Gradle files
        run: |
          # build.gradle
          cat > build.gradle << 'GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          GRADLE
          
          # app/build.gradle
          cat > app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'
          android {
              compileSdk 30
              namespace 'com.jupyter.mobile'
              
              defaultConfig {
                  applicationId "com.jupyter.mobile"
                  minSdk 21
                  targetSdk 30
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.8.0'
          }
          GRADLE
          
          # AndroidManifest.xml
          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              
              <application android:allowBackup="true" android:label="Jupyter Mobile">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST
          
          # Layout
          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/activity_main.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <WebView xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/webview"
              android:layout_width="match_parent"
              android:layout_height="match_parent" />
          XML
      
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jupyter-mobile-fast
          path: app/build/outputs/apk/release/*.apk
