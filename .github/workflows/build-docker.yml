name: Build APK using Docker (Non-root)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build APK with Docker
      run: |
        docker run --rm \
          -v $(pwd):/home/user/hostdir \
          kivy/buildozer:latest \
          bash -c "cd /home/user/hostdir && buildozer android debug --no-root-warning"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jupyter-ide-apk
        path: ./bin/*.apk
        if-no-files-found: error