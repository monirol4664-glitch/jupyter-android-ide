name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build React app
      run: npm run build
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Create Android project structure
      run: |
        mkdir -p android/app/src/main/assets
        mkdir -p android/app/src/main/java/com/mathapp
        cp -r build/* android/app/src/main/assets/
    
    - name: Create AndroidManifest.xml
      run: |
        cat > android/app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.mathapp.pro">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="MathMaster Pro"
                android:theme="@style/AppTheme">
                <activity
                    android:name=".MainActivity"
                    android:configChanges="orientation|keyboardHidden|screenSize"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
    
    - name: Create MainActivity.java
      run: |
        cat > android/app/src/main/java/com/mathapp/MainActivity.java << 'EOF'
        package com.mathapp.pro;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import androidx.appcompat.app.AppCompatActivity;
        public class MainActivity extends AppCompatActivity {
            private WebView webView;
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(getResources().getIdentifier("activity_main", "layout", getPackageName()));
                webView = findViewById(getResources().getIdentifier("webView", "id", getPackageName()));
                webView.setWebViewClient(new WebViewClient());
                webView.getSettings().setJavaScriptEnabled(true);
                webView.getSettings().setDomStorageEnabled(true);
                webView.loadUrl("file:///android_asset/index.html");
            }
            @Override
            public void onBackPressed() {
                if (webView.canGoBack()) {
                    webView.goBack();
                } else {
                    super.onBackPressed();
                }
            }
        }
        EOF
    
    - name: Create layout file
      run: |
        mkdir -p android/app/src/main/res/layout
        cat > android/app/src/main/res/layout/activity_main.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <WebView xmlns:android="http://schemas.android.com/apk/res/android"
            android:id="@+id/webView"
            android:layout_width="match_parent"
            android:layout_height="match_parent" />
        EOF
    
    - name: Create build.gradle
      run: |
        cat > android/build.gradle << 'EOF'
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:7.4.2'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF
        
        cat > android/app/build.gradle << 'EOF'
        apply plugin: 'com.android.application'
        android {
            compileSdk 33
            defaultConfig {
                applicationId "com.mathapp.pro"
                minSdk 21
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android.txt')
                }
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'androidx.webkit:webkit:1.6.0'
        }
        EOF
    
    - name: Create settings.gradle
      run: |
        cat > android/settings.gradle << 'EOF'
        include ':app'
        rootProject.name = "MathMaster"
        EOF
    
    - name: Create gradle wrapper
      run: |
        cd android
        gradle wrapper --gradle-version 7.5
        chmod +x gradlew
        cd ..
    
    - name: Build APK
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon
        cd ..
    
    - name: Sign APK (Debug)
      run: |
        cd android
        # Create debug keystore if not exists
        if [ ! -f debug.keystore ]; then
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug, O=Android, C=US"
        fi
        # Sign the APK
        jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore debug.keystore -storepass android -keypass android app/build/outputs/apk/release/app-release-unsigned.apk androiddebugkey
        # Align the APK
        $ANDROID_HOME/build-tools/33.0.0/zipalign -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/MathMaster.apk
        cd ..
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MathMaster-APK
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 90
    
    - name: Create Release
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: android/app/build/outputs/apk/release/*.apk
        generate_release_notes: true