name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Build APK
        run: |
          # Create project structure
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/app
          
          # Copy HTML file
          cp editor.html app/src/main/assets/
          
          # Create MainActivity
          cat > app/src/main/java/com/app/MainActivity.java << 'EOF'
          package com.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webView.loadUrl("file:///android_asset/editor.html");
                  setContentView(webView);
              }
          }
          EOF
          
          # Create AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.app">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="Python Editor" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Create gradle.properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx1536m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          
          # Create build.gradle (root)
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  jcenter()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:3.5.4'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  jcenter()
              }
          }
          EOF
          
          # Create build.gradle (app)
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              compileSdkVersion 29
              
              defaultConfig {
                  applicationId "com.app"
                  minSdkVersion 21
                  targetSdkVersion 29
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  debug {
                      debuggable true
                  }
              }
          }
          EOF
          
          # Create settings.gradle
          echo 'include ":app"' > settings.gradle
          
          # Create local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          
          # Generate wrapper.properties manually (to avoid gradle command)
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-6.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Download gradle wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v6.5.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          
          # Create gradlew script
          cat > gradlew << 'EOF'
          #!/bin/sh
          if [ -n "$JAVA_HOME" ] ; then
              if [ -x "$JAVA_HOME/bin/java" ] ; then
                  JAVACMD="$JAVA_HOME/bin/java"
              fi
          fi
          
          if [ -z "$JAVACMD" ] ; then
              if [ -z "$JAVA_HOME" ] ; then
                  JAVACMD=java
              fi
          fi
          
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          exec "$JAVACMD" -cp "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          
          chmod +x gradlew
          
          # Build the APK
          ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: python-editor
          path: app/build/outputs/apk/debug/*.apk
