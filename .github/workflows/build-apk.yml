name: Build Python IDE APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'
          accept-android-sdk-licenses: true
      
      - name: Create Android project
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/app
          cp index.html app/src/main/assets/
          cp MainActivity.java app/src/main/java/com/app/
          cp AndroidManifest.xml app/src/main/
          
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              defaultConfig {
                  applicationId "com.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF
          
          echo 'include ":app"' > settings.gradle
          
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          EOF
          
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v7.5.0/gradle/wrapper/gradle-wrapper.jar
          
          cat > gradlew << 'EOF'
          #!/bin/sh
          exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew
      
      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Python-IDE
          path: app/build/outputs/apk/debug/*.apk