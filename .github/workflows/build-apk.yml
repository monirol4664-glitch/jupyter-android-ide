name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'
      
      - name: Create Android project
        run: |
          # Create project directories
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/app
          
          # Copy your HTML editor
          cp editor.html app/src/main/assets/
          
          # Create MainActivity.java
          cat > app/src/main/java/com/app/MainActivity.java << 'JAVA'
          package com.app;
          
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.WebChromeClient;
          
          public class MainActivity extends Activity {
              private WebView webView;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  webView = new WebView(this);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setLoadWithOverviewMode(true);
                  webSettings.setUseWideViewPort(true);
                  webSettings.setBuiltInZoomControls(true);
                  webSettings.setDisplayZoomControls(false);
                  webSettings.setSupportZoom(true);
                  
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.loadUrl("file:///android_asset/editor.html");
                  setContentView(webView);
              }
              
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          JAVA
          
          # Create AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.app">
              
              <uses-permission android:name="android.permission.INTERNET" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:label="Python Editor"
                  android:usesCleartextTraffic="true"
                  android:theme="@android:style/Theme.Holo">
                  
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST
      
      - name: Create Gradle files
        run: |
          # Root build.gradle
          cat > build.gradle << 'GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.4'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          GRADLE
          
          # App build.gradle
          cat > app/build.gradle << 'APPGRADLE'
          plugins {
              id 'com.android.application'
          }
          
          android {
              namespace 'com.app'
              compileSdk 34
              
              defaultConfig {
                  applicationId 'com.app'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              
              buildTypes {
                  debug {
                      debuggable true
                  }
              }
          }
          APPGRADLE
          
          # Settings.gradle
          cat > settings.gradle << 'SETTINGS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'PythonNotebook'
          include ':app'
          SETTINGS
          
          # Gradle properties
          cat > gradle.properties << 'PROPERTIES'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=false
          PROPERTIES
      
      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          
          # Create gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPER'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WRAPPER
          
          # Download gradle-wrapper.jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
          
          # Create gradlew script
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          JAVA_CMD="java"
          if [ -n "$JAVA_HOME" ] && [ -x "$JAVA_HOME/bin/java" ]; then
              JAVA_CMD="$JAVA_HOME/bin/java"
          fi
          exec $JAVA_CMD -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          
          chmod +x gradlew
      
      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Python-Editor-App
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30