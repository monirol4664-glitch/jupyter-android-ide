name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Build APK from HTML
        run: |
          # Create Android project structure
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/app
          
          # Copy your HTML editor
          cp editor.html app/src/main/assets/
          
          # Create MainActivity
          cat > app/src/main/java/com/app/MainActivity.java << 'EOF'
          package com.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webView.loadUrl("file:///android_asset/editor.html");
                  setContentView(webView);
              }
          }
          EOF
          
          # Create AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.app">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="Python Editor" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Create build.gradle files
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  debug {
                      debuggable true
                  }
              }
          }
          EOF
          
          echo 'include ":app"' > settings.gradle
          
          # Generate gradle wrapper
          echo "Creating gradle wrapper..."
          gradle wrapper --gradle-version 8.0
          
          # Make gradlew executable
          chmod +x gradlew
          
          # Build the APK
          echo "Building APK..."
          ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: python-editor
          path: app/build/outputs/apk/debug/*.apk